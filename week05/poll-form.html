<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD130 HTML Form</title>
    <meta name="author" content="Ron Anderson">
    <meta name="description" content="Author learns to create a web form">
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>

    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>

                <div class="contact">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="contact">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div> <!-- contact -->
            </fieldset>


            <fieldset>
                <legend>Questions</legend>

                <div class="wrap">
                    <div class="questions">
                        <label for="browser">Select your favorite browser:</label>
                        <select id="browser" name="browser">
                            <option value="chrome">Chrome</option>
                            <option value="safari">Safari</option>
                            <option value="edge">Edge</option>
                            <option value="brave">Brave</option>
                            <option value="other">Other</option>
                        </select>
                    </div><!-- questions -->

                    <div class="questions">
                        <label for="pet">Do you have a household pet?</label>
                        <input type="checkbox" id="pet" name="pet">
                    </div><!-- questions -->

                    <div class="questions">
                        <label for="feedback">List the places you have lived:</label>
                    </div><!-- questions -->
                </div><!-- wrap -->

                </div><textarea id="feedback" name="feedback" rows="4"
                  placeholder="Provo Utah, Palos Verdes California, Ulaanbaatar Mongolia, Johannesburg South Africa"></textarea>
            </fieldset>

            <button type="submit">Submit Poll</button>
        </form>
    </main>

    <footer>
        <p>&copy;2026 | HTML Form - User Poll Activity | Ron Anderson</p>
    </footer>
</body>

</html>
