<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitewater Rafting | Contact Us</title>
    <meta name="author" content="Ron Anderson">
    <meta name="description"
      content="Contact our rafting company about the adventures awaiting you on the Snake River">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo_round.webp" alt="Rafting Logo">
        <nav>
            <ul class="header-navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="top">
            <h2>Ron's Whitewater Rafting Company</h2>
            <p>1250 Canyon Rim Drive</p>
            <p>Jackson, WY 83001</p>
            <p>+1 123 456-7890</p>
            <p><a href="mailto:info@ronswhitewaterrafting.com">info@ronswhitewaterrafting.com</a>
            </p>
        </div><!-- top -->

        <div class="middle">

            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14442.736799494212!2d-110.77254893475856!3d43.49028209038797!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x53531a58fccf7f4b%3A0xa63ea7bec6620c2d!2sF6RQ%2B22M%2C%20Jackson%2C%20WY!5e1!3m2!1sen!2sus!4v1775062512441!5m2!1sen!2sus"
              style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>

            <div class="middle-right-col">
                <form>
                    <div class="form-double-col">
                        <label for="q1">Name</label>
                        <input type="text" id="q1" name="q1" required>

                        <label for="q2">Email</label>
                        <input type="email" id="q2" name="q2" required>

                        <label class="message-purpose-heading">Message Purpose</label>

                        <div class="radio-group">
                            <input type="radio" id="q3a" name="q3" value="General Inquiry" required>
                            <label for="q3a">General Inquiry</label>
                        </div> <!-- radio-group -->

                        <div class="radio-group">
                            <input type="radio" id="q3b" name="q3" value="Reservation Question"
                              required>
                            <label for="q3b">Reservation Question</label>
                        </div> <!-- radio-group -->

                        <div class="radio-group">
                            <input type="radio" id="q3c" name="q3" value="Website Suggestion"
                              required>
                            <label for="q3c">Website Suggestion</label>
                        </div> <!-- radio-group -->
                    </div> <!-- form-double-col -->

                    <div class="form-spanned-cols">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5"
                          placeholder="Type here"></textarea>

                        <div class="checkbox-row">
                            <input type="checkbox" id="subscribe" name="subscribe" checked>
                            <label for="subscribe">Please subscribe me to the monthly
                                newsletter</label>
                        </div><!-- checkbox-row-->

                        <button type="submit">Get in Touch!</button>
                    </div> <!-- form-spanned-cols -->
                </form>
            </div> <!-- middle-right-col -->
        </div> <!-- middle -->

        <div class="bottom">
            <h1>We Are Here to Serve You</h1>
            <div class="gallery">
                <figure>
                    <img src="images/profile-ray.jpg" alt="Ray's profile">
                    <figcaption>
                        <strong>Ray</strong> — Veteran river guide with a passion for safety and
                        unforgettable adventures on the Snake River.
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/profile-lisa.jpg" alt="Lisa's profile">
                    <figcaption><strong>Lisa</strong> — Trip coordinator who ensures every
                        detail is
                        handled so guests can relax and enjoy the ride.</figcaption>
                </figure>

                <figure>
                    <img src="images/profile-ben.jpg" alt="Ben's profile">
                    <figcaption><strong>Ben</strong> — Energetic guide who loves big rapids,
                        great
                        stories, and helping first-time rafters feel at home.</figcaption>
                </figure>

            </div> <!--gallery-->
        </div> <!--bottom-->
    </main>

    <footer>
        <p>&copy;2026 | Ron's Whitewater Rafting | Ron Anderson</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank"><img src="images/facebook-icon.jpg"
                  alt="Facebook"></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram-icon.jpg"
                  alt="Instagram"></a>
            <a href="https://linkedin.com" target="_blank"><img src="images/linkedin-icon.jpg"
                  alt="LinkedIn"></a>
        </nav>
    </footer>
</body>

</html>
