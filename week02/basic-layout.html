<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Ron Anderson">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="logo" width="128" height="128">
        <nav>
            <ul>
                <li>
                    <a href="https://www.nytimes.com/">
                        The New York Times
                    </a>
                </li>
                <li>
                    <a href="https://www.wsj.com/">
                        The Wall Street Journal
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading 1</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nihil, eos?</p>
        </section>
        <section>
            <h2>Heading 2</h2>
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Aliquam, dolores?</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/accra-ghana/320x200/accra-ghana-temple-759298-wallpaper.jpg"
          alt="Accra Ghana Temple sign" width="200">
    </aside>
    <footer>
        <p>Ron Anderson</p>
    </footer>
</body>

</html>
